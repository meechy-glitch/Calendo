services:
  - type: web
    name: calendo-api
    env: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: FRONTEND_URL
        value: https://your-app.vercel.app
      - key: JWT_EXPIRE_DAYS
        value: 7