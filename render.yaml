services:
  - type: web
    name: calendo-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn src.backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: calendo-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: FRONTEND_URL
        value: https://calendo-frontend.onrender.com
      - key: JWT_EXPIRE_DAYS
        value: 7

  - type: web
    name: calendo-frontend
    env: static
    buildCommand: cd src/frontend && npm install && npm run build
    staticPublishPath: src/frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: calendo-db
    databaseName: calendo
    user: calendo
    plan: free
